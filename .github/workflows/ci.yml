name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest api/tests/test_unit.py -v

      # api depends_on mlflow (service_healthy), so Compose brings mlflow up first
      - name: Start API stack
        run: docker compose up -d api

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API is up"
              break
            fi
            sleep 5
          done
          curl -sf http://localhost:8000/health || (echo "API never became healthy" && docker compose logs api && exit 1)

      - name: Run integration tests
        env:
          API_URL: http://localhost:8000
        run: pytest api/tests/test_integration.py -v

      - name: Stop Docker stack
        if: always()
        run: docker compose down

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/waste-detection-api:latest
